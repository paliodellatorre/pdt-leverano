<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

<style>
    body {
        background-color: #003129;
        color: #FCBD16;
        font-family: Arial, Helvetica, sans-serif;
    }

    .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
    }

    h1, h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .card {
        border: 1px solid #FCBD16;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 25px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #FCBD16;
        background-color: #003129;
        color: #FCBD16;
        margin-top: 6px;
    }

    .row {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
    }

    .col {
        flex: 1;
        min-width: 220px;
    }

    button {
        background-color: #FCBD16;
        color: #003129;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        width: 100%;
    }

    button:hover {
        opacity: 0.9;
    }

    /* RADIO INLINE */

    .radio-group {
        display: flex;
        gap: 25px;
        align-items: center;
        margin-top: 10px;
    }

    .radio-group label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
    }

    .radio-group input[type="radio"] {
        transform: scale(1.2);
    }

</style>
```

</head>

<body>

<div class="container">

```
<div style="text-align:center; margin-bottom:20px;">
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="Logo" style="max-height:120px;">
</div>

<h1>ISCRIZIONI SPORT</h1>

<form method="POST">

    <div class="card">
        <h2>Conferma quota</h2>

        <label>
            Confermo di aver compreso che l'iscrizione ha un costo da consegnare agli organizzatori prima dell'inizio del torneo.
            La maglia del proprio rione può essere acquistata a parte a € 5.
        </label>

        <div class="radio-group">
            <label>
                <input type="radio" name="conferma_quota" value="Si" required>
                Sì
            </label>

            <label>
                <input type="radio" name="conferma_quota" value="No">
                No
            </label>
        </div>

    </div>

    <div class="card">

        <h2>1° giocatore</h2>

        <div class="row">

            <div class="col">
                <label>Nome e Cognome *</label>
                <input type="text" name="nome1" required>
            </div>

            <div class="col">
                <label>Codice fiscale *</label>
                <input type="text" name="cf1" required>
            </div>

            <div class="col">
                <label>Telefono *</label>
                <input type="text" name="telefono1" required>
            </div>

            <div class="col">
                <label>Rione *</label>
                <select name="rione1" required>
                    <option value="">Seleziona</option>
                    {% for rione in rioni %}
                    <option value="{{ rione }}">{{ rione }}</option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <br>

        <label>Vuoi acquistare la maglia del rione per il 1° giocatore? (+ € 5)</label>

        <div class="radio-group">
            <label>
                <input type="radio" name="maglia1" value="Si">
                Sì
            </label>

            <label>
                <input type="radio" name="maglia1" value="No">
                No
            </label>
        </div>

    </div>

    <div class="card">

        <h2>Consensi</h2>

        <label>Accetto il trattamento dei dati personali</label>

        <div class="radio-group">
            <label>
                <input type="radio" name="privacy" value="Si" required>
                Sì
            </label>

            <label>
                <input type="radio" name="privacy" value="No">
                No
            </label>
        </div>

        <br>

        <label>Dichiaro di partecipare sotto la mia responsabilità</label>

        <div class="radio-group">
            <label>
                <input type="radio" name="responsabilita" value="Si" required>
                Sì
            </label>

            <label>
                <input type="radio" name="responsabilita" value="No">
                No
            </label>
        </div>

    </div>

    <button type="submit">
        INVIA ISCRIZIONE
    </button>

</form>
```

</div>

</body>
