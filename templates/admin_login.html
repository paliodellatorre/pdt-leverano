{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<section class="section-card admin-login-card">
    <h1>Accesso admin</h1>
    <form method="post" class="simple-form">
        <div class="field">
            <label>Username</label>
            <input name="username" required>
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button class="submit-btn" type="submit">Entra</button>
    </form>
</section>
{% endblock %}
