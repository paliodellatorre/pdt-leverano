
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>
<body>
<h1>Dashboard Iscrizioni</h1>
<a href="/export_excel">Scarica Excel</a>
<table border="1">
<tr>
<th>ID</th>
<th>Nome</th>
<th>Telefono</th>
<th>Squadra</th>
<th>Data</th>
<th>Azioni</th>
</tr>
{% for row in registrations %}
<tr>
<td>{{ row["id"] }}</td>
<td>{{ row["name"] }}</td>
<td>{{ row["phone"] }}</td>
<td>{{ row["team"] }}</td>
<td>{{ row["created_at"] }}</td>
<td><a href="/delete/{{ row['id'] }}">Elimina</a></td>
</tr>
{% endfor %}
</table>
</body>
</html>
